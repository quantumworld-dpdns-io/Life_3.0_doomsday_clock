# Trivy secret scanning configuration.
# Keep allow-rules narrow and only for documented placeholders/test fixtures.

allow-rules:
  - id: env-example-placeholders
    description: Allow documented placeholder values in example env files.
    path: (^|.*/)\.env\.example$
    regex: (?i)(change-me|your-[a-z0-9-]+\.example\.com|YOUR_[A-Z0-9_]+|dev-api-key|dev-secret-change-me)

  - id: docs-placeholder-passwords
    description: Allow placeholder credentials in documentation.
    path: (^|.*/)(readme\.md|docs/.*\.md|CLAUDE\.md)$
    regex: (?i)(YOUR_URL_ENCODED_PASSWORD|change-me|your-project-ref)

  - id: local-development-postgres-url
    description: Allow non-production local Docker Postgres example URLs.
    regex: postgres://life3:life3@(localhost|postgres):5432/life3
