name: Snyk CI Scan

on:
  push:
    branches:
    - main
    - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk:
    name: Dependency vulnerability scan
    runs-on: ubuntu-24.04
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Skip Snyk when token is unavailable
      if: env.SNYK_TOKEN == ''
      run: echo "SNYK_TOKEN is not configured; skipping Snyk scan."

    - name: Install Snyk CLI
      if: env.SNYK_TOKEN != ''
      uses: snyk/actions/setup@master

    - name: Run Snyk test
      if: env.SNYK_TOKEN != ''
      run: snyk test --all-projects --detection-depth=6 --severity-threshold=high
