name: CI

on:
  push:
    branches: [main,staging]
  pull_request:
    branches: [main,staging]

jobs:
  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell scripts
        run: bash -n shared/scripts/*.sh
      - name: Validate Makefile targets
        run: make help
      - name: Validate Docker Compose config
        run: docker compose config

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - uses: astral-sh/setup-uv@v5
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install Go proto plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
      - name: Generate available proto stubs
        run: PROTO_STRICT=1 make proto

  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies if implemented
        run: |
          if [ -f apps/web/package.json ]; then
            cd apps/web
            if [ -f package-lock.json ]; then npm ci; else npm install; fi
          fi
      - name: Lint
        run: make lint
      - name: Test
        run: make test

  compose-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Compose images
        run: docker compose build
